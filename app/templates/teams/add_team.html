{% extends 'base.html' %}


{% block content %}

    <div class="add-team-container">
        <h1>Создание команды</h1>
        <form id="addTeamForm">
            <div class="form-group">
                <label for="teamName">Название команды:</label>
                <input type="text" id="teamName" name="name" required>
            </div>
            <button type="submit">Создать команду</button>
        </form>
        <div id="messageArea" class="message-area" style="display: none;"></div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>

<script>
    document.getElementById('addTeamForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // Предотвращаем стандартную отправку формы

        const teamNameInput = document.getElementById('teamName');
        const messageArea = document.getElementById('messageArea');
        const errorMessage = document.getElementById('errorMessage');

        messageArea.style.display = 'none';
        errorMessage.style.display = 'none';
        messageArea.textContent = '';
        errorMessage.textContent = '';

        const teamName = teamNameInput.value.trim();

        if (!teamName) {
            errorMessage.textContent = 'Название команды не может быть пустым.';
            errorMessage.style.display = 'block';
            return;
        }

        const teamData = {
            name: teamName
        };

        try {
            // Получаем CSRF токен, если используется Django
            // const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value; // Раскомментируйте, если используете Django

            const response = await fetch('/add_team', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Если требуется токен аутентификации, добавьте его сюда:
                    // 'Authorization': `Bearer ${getAuthToken()}`, 
                    // 'X-CSRFToken': csrftoken // Добавьте CSRF токен, если используете Django
                },
                body: JSON.stringify(teamData)
            });

            const result = await response.json();

            if (response.ok) {
                messageArea.textContent = result.message;
                messageArea.style.display = 'block';
                teamNameInput.value = ''; // Очищаем поле ввода после успешного создания
            } else {
                if (result && result.detail) {
                    errorMessage.textContent = `Ошибка: ${result.detail}`;
                } else {
                    errorMessage.textContent = 'Произошла неизвестная ошибка при создании команды.';
                }
                errorMessage.style.display = 'block';
            }
        } catch (error) {
            console.error('Network error:', error);
            errorMessage.textContent = 'Ошибка сети. Попробуйте позже.';
            errorMessage.style.display = 'block';
        }
    });

    // Функция для получения токена аутентификации (если требуется)
    // function getAuthToken() {
    //     // Реализуйте получение токена из cookie или localStorage
    //     // Например: return document.cookie.split('; ').find(row => row.startsWith('access_token=')).split('=')[1];
    //     return null; // Заглушка
    // }
</script>

{% endblock %}
