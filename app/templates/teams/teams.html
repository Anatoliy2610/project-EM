{% extends 'base.html' %}


{% block content %}

        <div class="container">
        <header class="d-flex justify-content-center py-3 ">
          <ul class="nav nav-pills">
            <li class="nav-item px-3"><a href="/register-form/">регистрация</a></li>
            <li class="nav-item px-3"><a href="/login-form/">вход</a></li>
            <li class="nav-item px-3"><a href="/logout/">выход</a></li>

          </ul>
        </header>
      </div>

<table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>name</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for team in teams_data %}
        <tr>
          <td>{{ team.id }}</td>
          <td>{{ team.name }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>


<script>
  async function fetchTeams() {
      const accessToken = localStorage.getItem('accessToken');
      const tableBody = document.getElementById('teams-table-body');

      if (!accessToken) {
          alert('Пожалуйста, авторизуйтесь!');
          tableBody.innerHTML = '<tr><td colspan="3">Требуется авторизация.</td></tr>';
          // window.location.href = '/login'; // Перенаправим, если нужно
          return;
      }

      // Очищаем предыдущее содержимое и показываем "Загрузка..."
      tableBody.innerHTML = '<tr><td colspan="3">Загрузка команд...</td></tr>';

      try {
          const response = await fetch('/teams', { // Ваш API endpoint для получения команд
              method: 'GET',
              headers: {
                  'Authorization': `Bearer ${accessToken}`,
              }
          });

          if (!response.ok) {
              if (response.status === 401) {
                  alert('Ошибка авторизации. Токен недействителен.');
                  localStorage.removeItem('accessToken');
                  // window.location.href = '/login';
                  tableBody.innerHTML = '<tr><td colspan="3">Ошибка авторизации.</td></tr>';
              } else {
                  const errorText = await response.text();
                  console.error('Ошибка ответа:', response.status, errorText);
                  alert(`Ошибка загрузки команд: ${response.statusText}`);
                  tableBody.innerHTML = `<tr><td colspan="3">Ошибка загрузки: ${response.status}</td></tr>`;
              }
              return;
          }

          const teams = await response.json(); // Получаем массив команд

          // Очищаем сообщение "Загрузка..."
          tableBody.innerHTML = '';

          if (teams.length === 0) {
              tableBody.innerHTML = '<tr><td colspan="3">Команд не найдено.</td></tr>';
              return;
          }

          // Вставляем полученные команды в таблицу
          teams.forEach(team => {
              const row = tableBody.insertRow(); // Создаем новую строку

              const idCell = row.insertCell();
              idCell.textContent = team.id; // Предполагаем,что сервер возвращает {id: 1, name: "Team A"}

              const nameCell = row.insertCell();
              nameCell.textContent = team.name;

              // Добавляем ячейку для действий, если нужно
              const actionsCell = row.insertCell();
              actionsCell.innerHTML = `
                  <div class="d-flex justify-content-center">
                      <a href="/teams/${team.id}/edit/" class="btn btn-sm btn-primary me-2">Редактировать</a>
                      <button onclick="deleteTeam(${team.id})" class="btn btn-sm btn-danger">Удалить</button>
                  </div>
              `;
          });

      } catch (error) {
          console.error('Ошибка сети:', error);
          alert('Произошла ошибка сети.');
          tableBody.innerHTML = '<tr><td colspan="3">Сетевая ошибка.</td></tr>';
      }
  }

  // Функция для удаления (пример)
  function deleteTeam(teamId) {
      // Реализуйте здесь логику удаления команды
      console.log('Удалить команду с ID:', teamId);
      alert('Функция удаления пока не реализована.');
      // fetchTeams(); // Перезагрузить список после удаления
  }

  // Вызываем функцию при загрузке DOM
  document.addEventListener('DOMContentLoaded', fetchTeams);
</script>

{% endblock %}
