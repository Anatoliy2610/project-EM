{% extends 'base.html' %}

{% block content %}



<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="text-center mb-4">Изменение данных пользователя</h1>
            <p class="text-center text-muted mb-4">Текущий email: {{ current_user.email }}</p>
            <form id="updateUserForm" class="p-4 border rounded shadow-sm">
                <div class="mb-3">
                    <label for="updateEmail" class="form-label">Новый Email</label>
                    <input type="email" class="form-control" id="updateEmail" name="email" placeholder="Оставьте пустым, если не хотите менять">
                    <div class="valid-feedback"></div>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                    <label for="updatePassword" class="form-label">Новый Пароль</label>
                    <input type="password" class="form-control" id="updatePassword" name="password" placeholder="Оставьте пустым, если не хотите менять">
                    <div class="valid-feedback"></div>
<div class="invalid-feedback"></div>
                </div>
                <div id="updateMessageArea" class="alert alert-info mt-3" role="alert" style="display: none;"></div>
                <div id="updateErrorMessage" class="alert alert-danger mt-3" role="alert" style="display: none;"></div>
                <button type="submit" class="btn btn-warning w-100 mt-3">Сохранить изменения</button>
            </form>
        </div>
    </div>
</div>



<script>
    document.getElementById('updateUserForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // Предотвращаем стандартную отправку формы

        const form = event.target;
        const formData = new FormData(form); // Получаем данные из формы

        // Преобразуем FormData в объект JSON, исключая пустые поля
        const data = {};
        for (let [key, value] of formData.entries()) {
            if (value) { // Добавляем только непустые значения
                data[key] = value;
            }
        }

        const messageArea = document.getElementById('messageArea');
        const errorMessage = document.getElementById('errorMessage');

        messageArea.style.display = 'none';
        errorMessage.style.display = 'none';
        messageArea.textContent = '';
        errorMessage.textContent = '';

        try {
            const response = await fetch('/update_user', { // Отправляем POST/PATCH запрос
                method: 'PATCH', // Используем PATCH, как в вашем эндпоинте
                headers: {
                    'Content-Type': 'application/json',
                    // Если ваша аутентификация основана на токене в заголовке, добавьте его сюда:
                    // 'Authorization': `Bearer ${getAuthToken()}` 
                },
                body: JSON.stringify(data) // Отправляем данные в формате JSON
            });

            const result = await response.json();

            if (response.ok) {
                messageArea.textContent = result.message;
                messageArea.style.display = 'block';
                form.reset(); // Очищаем форму после успешного обновления
                // Опционально: сбросить поля, которые были пустыми, или обновить текущие данные пользователя
            } else {
                // Обработка ошибок от сервера
                if (result && result.detail) {
                    errorMessage.textContent = `Ошибка: ${result.detail}`;
                } else {
                    errorMessage.textContent = 'Произошла неизвестная ошибка при обновлении.';
                }
                errorMessage.style.display = 'block';
            }
        } catch (error) {
            // Обработка сетевых ошибок
            console.error('Network error:', error);
            errorMessage.textContent = 'Ошибка сети. Попробуйте позже.';
            errorMessage.style.display = 'block';
        }
    });

    // Функция для получения токена аутентификации (если требуется)
    // function getAuthToken() {
    //     // Реализуйте получение токена из cookie или localStorage
    //     // Например: return document.cookie.split('; ').find(row => row.startsWith('access_token=')).split('=')[1];
    //     return null; // Заглушка
    // }
</script>
{% endblock %}
